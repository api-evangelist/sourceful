aid: sourceful
name: Sourceful
description: >-
  Sourceful is a Manchester, United Kingdom packaging technology company that
  began as a sustainable packaging marketplace connecting brands with vetted
  manufacturers and offering data-driven carbon footprint, life-cycle, and
  recyclability metrics for every packaging design. Founded in 2020 by Wing
  Chan and Charlie Bradshaw, the company raised roughly $32M from investors
  including Index Ventures, Coatue, and Eka Ventures, and grew to over 100
  employees serving climate-conscious consumer brands. Since 2024–2025
  Sourceful has pivoted toward AI-powered visual design for packaging,
  releasing Sourceful 3.0 and Riverflow 1, a proprietary image-editing
  foundation model marketed as state-of-the-art for design-grade,
  print-ready packaging artwork. The current product line covers AI logo
  design, packaging design, AI product photography, image editing, packaging
  ranges, flavor/variant ranges, brand moodboards, and (announced) product
  mockups and social ads. Sourceful is ISO 42001 certified for AI management.
  As of this profile the company does not publish a public developer API,
  SDK, OpenAPI specification, or open-source GitHub organization for the
  packaging/design platform, and the original sustainable-packaging
  marketplace surface and supplier-facing carbon footprint API have been
  superseded by the AI design product; there is no Sourceful developer
  portal at this time. The unrelated github.com/sourceful organization
  belongs to Pony Foo, not this company, and sourceful.energy is a separate
  distributed-energy-resource platform unrelated to Sourceful Ltd.
